version: '3.9'

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  mongodb:
    image: mongo:7.0
    container_name: ecom-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    networks:
      - ecom-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecom-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ecom-network
    healthcheck:
      test: rabbitmq-diagnostics -q check_running
      interval: 15s
      timeout: 10s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ecom-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_MASTER_KEY: your-meilisearch-master-key
      MEILI_ENV: development
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Monitoring
  # ============================================

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ecom-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - ecom-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ecom-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - ecom-network

  # ============================================
  # API Gateway
  # ============================================

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ecom-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - GATEWAY_PORT=8000
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - CORS_ORIGIN=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # ============================================
  # Microservices
  # ============================================

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: ecom-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_PORT=8001
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - AUTH_DB_NAME=auth_db
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - JWT_REFRESH_SECRET=your-refresh-secret-key-change-me
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: ecom-user
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development
      - USER_SERVICE_PORT=8002
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - USER_DB_NAME=user_db
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  product-service:
    build:
      context: ./services/product
      dockerfile: Dockerfile
    container_name: ecom-product
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - PRODUCT_SERVICE_PORT=8003
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - PRODUCT_DB_NAME=product_db
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  inventory-service:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    container_name: ecom-inventory
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=development
      - INVENTORY_SERVICE_PORT=8004
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - INVENTORY_DB_NAME=inventory_db
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  cart-service:
    build:
      context: ./services/cart
      dockerfile: Dockerfile
    container_name: ecom-cart
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=development
      - CART_SERVICE_PORT=8005
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PRODUCT_SERVICE_URL=http://product-service:8003
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  order-service:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    container_name: ecom-order
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      - NODE_ENV=development
      - ORDER_SERVICE_PORT=8006
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - ORDER_DB_NAME=order_db
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  payment-service:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    container_name: ecom-payment
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      - NODE_ENV=development
      - PAYMENT_SERVICE_PORT=8007
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - PAYMENT_DB_NAME=payment_db
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - STRIPE_SECRET_KEY=sk_test_your_stripe_test_key
      - STRIPE_WEBHOOK_SECRET=whsec_your_webhook_secret
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  search-service:
    build:
      context: ./services/search
      dockerfile: Dockerfile
    container_name: ecom-search
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      - NODE_ENV=development
      - SEARCH_SERVICE_PORT=8008
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY=your-meilisearch-master-key
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      meilisearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  notification-service:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: ecom-notification
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      - NODE_ENV=development
      - NOTIFICATION_SERVICE_PORT=8009
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - NOTIFICATION_DB_NAME=notification_db
      - JWT_ACCESS_SECRET=your-access-secret-key-change-me
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=587
      - SMTP_USER=your_smtp_user
      - SMTP_PASS=your_smtp_pass
      - EMAIL_FROM=noreply@ecommerce.com
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecom-network

  recommendation-service:
    build:
      context: ./services/recommendation
      dockerfile: Dockerfile
    container_name: ecom-recommendation
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017
      - RECOMMENDATION_DB_NAME=recommendation_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network

  # ============================================
  # Frontend
  # ============================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecom-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=http://localhost:8009
    depends_on:
      - gateway
    networks:
      - ecom-network

  # ============================================
  # Nginx Reverse Proxy
  # ============================================

  nginx:
    image: nginx:alpine
    container_name: ecom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - frontend
    networks:
      - ecom-network

# ============================================
# Volumes
# ============================================

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:

# ============================================
# Networks
# ============================================

networks:
  ecom-network:
    driver: bridge
